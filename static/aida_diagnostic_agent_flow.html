<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AiDa Diagnostic Agent — System Flow</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --surface: #13161e;
    --border: rgba(255,255,255,0.08);
    --text-primary: #e8eaf0;
    --text-secondary: #8890a4;
    --purple-light: #a89df4;
    --purple-mid: #7F77DD;
    --purple-dark: #3C3489;
    --teal-light: #5DCAA5;
    --teal-mid: #1D9E75;
    --blue-light: #85B7EB;
    --blue-mid: #378ADD;
    --amber-light: #FAC775;
    --amber-mid: #EF9F27;
    --pink-light: #ED93B1;
    --pink-mid: #D4537E;
    --gray-mid: #888780;
  }

  html, body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px 64px;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
    max-width: 680px;
  }

  .badge {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--teal-mid);
    border: 1px solid rgba(29,158,117,0.35);
    border-radius: 4px;
    padding: 4px 12px;
    margin-bottom: 16px;
    background: rgba(29,158,117,0.06);
  }

  h1 {
    font-size: 28px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.02em;
    margin-bottom: 10px;
  }

  h1 span {
    color: var(--teal-light);
  }

  .subtitle {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.6;
  }

  .diagram-wrap {
    width: 100%;
    max-width: 800px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 24px;
    overflow-x: auto;
  }

  svg text {
    font-family: 'Inter', sans-serif;
  }

  .node { cursor: pointer; }
  .node:hover rect, .node:hover polygon { filter: brightness(1.12); }

  .layer-label {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.08em;
    font-weight: 500;
    opacity: 0.75;
  }

  footer {
    margin-top: 40px;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-secondary);
    opacity: 0.5;
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>

<header>
  <div class="badge">SYSTEM ARCHITECTURE</div>
  <h1>AiDa <span>Diagnostic Agent</span></h1>
  <p class="subtitle">End-to-end pipeline — from user problem intake to root cause synthesis</p>
</header>

<div class="diagram-wrap">
<svg width="100%" viewBox="0 0 740 1100" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .t  { font-family:'Inter',sans-serif; font-size:14px; font-weight:400; fill:#e8eaf0; }
    .ts { font-family:'Inter',sans-serif; font-size:12px; font-weight:400; fill:#8890a4; }
    .th { font-family:'Inter',sans-serif; font-size:14px; font-weight:500; fill:#e8eaf0; }
    .mono { font-family:'JetBrains Mono',monospace; font-size:11px; fill:#8890a4; letter-spacing:0.06em; }
    .arr { stroke:#8890a4; stroke-width:1; fill:none; }
    .node { cursor:pointer; }
    .node:hover > rect, .node:hover > polygon { opacity:0.85; }

    /* Purple — Frontend */
    .c-purple rect, .c-purple ellipse { fill:#1e1b3a; stroke:#534AB7; stroke-width:0.5; }
    .c-purple .th { fill:#a89df4; }
    .c-purple .ts { fill:#7F77DD; }

    /* Teal — Intake / LangGraph */
    .c-teal rect { fill:#0d2820; stroke:#0F6E56; stroke-width:0.5; }
    .c-teal .th { fill:#5DCAA5; }
    .c-teal .ts { fill:#1D9E75; }

    /* Blue — Artifacts */
    .c-blue rect { fill:#0c1e36; stroke:#185FA5; stroke-width:0.5; }
    .c-blue .th { fill:#85B7EB; }
    .c-blue .ts { fill:#378ADD; }

    /* Amber — Diagnostics */
    .c-amber rect { fill:#261a00; stroke:#854F0B; stroke-width:0.5; }
    .c-amber .th { fill:#FAC775; }
    .c-amber .ts { fill:#EF9F27; }

    /* Pink — Approval */
    .c-pink rect { fill:#260d18; stroke:#993556; stroke-width:0.5; }
    .c-pink .th { fill:#ED93B1; }
    .c-pink .ts { fill:#D4537E; }

    /* Gray — Neutral */
    .c-gray rect { fill:#1a1a18; stroke:#5F5E5A; stroke-width:0.5; }
    .c-gray .th { fill:#B4B2A9; }
    .c-gray .ts { fill:#888780; }

    /* Diamond (anomaly) */
    .diamond { fill:#1a0d18; stroke:#993556; stroke-width:1; }
    .diamond-text-main { font-family:'Inter',sans-serif; font-size:13px; font-weight:500; fill:#ED93B1; }
    .diamond-text-sub  { font-family:'JetBrains Mono',monospace; font-size:10px; fill:#993556; }
  </style>
</defs>
